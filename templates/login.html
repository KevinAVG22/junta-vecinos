{% extends "base.html" %}

{% block title %}Iniciar Sesión - Junta de Vecinos{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="w-full max-w-md">
        <div class="text-center mb-6">
            <img
                src="{{ url_for('static', filename='junta de vecinos.jpg') }}"
                alt="Logo Junta de Vecinos"
                class="mx-auto h-20 w-20 rounded-2xl object-cover shadow-md ring-1 ring-black/10 dark:ring-white/10"
            >
            <h2 class="mt-6 text-3xl font-extrabold text-gray-900 dark:text-slate-100">
                Iniciar Sesión
            </h2>
            <p class="mt-2 text-sm text-gray-600 dark:text-slate-300">
                Accede al sistema de gestión de vecinos
            </p>
        </div>
        
        <div class="bg-white dark:bg-slate-900 shadow-md rounded-2xl p-6 border border-gray-100 dark:border-slate-800">
            <form class="space-y-6" method="POST">
                <div class="rounded-md shadow-sm -space-y-px">
                <div>
                    <label for="username" class="sr-only">Usuario</label>
                    <input id="username" name="username" type="text" required 
                           class="appearance-none rounded-none relative block w-full px-3 py-2 border border-gray-300 dark:border-slate-700 placeholder-gray-500 dark:placeholder-slate-400 text-gray-900 dark:text-slate-100 dark:bg-slate-950 rounded-t-md focus:outline-none focus:ring-primary focus:border-primary focus:z-10 sm:text-sm" 
                           placeholder="Usuario">
                </div>
                <div>
                    <label for="password" class="sr-only">Contraseña</label>
                    <input id="password" name="password" type="password" required 
                           class="appearance-none rounded-none relative block w-full px-3 py-2 border border-gray-300 dark:border-slate-700 placeholder-gray-500 dark:placeholder-slate-400 text-gray-900 dark:text-slate-100 dark:bg-slate-950 rounded-b-md focus:outline-none focus:ring-primary focus:border-primary focus:z-10 sm:text-sm" 
                           placeholder="Contraseña">
                </div>
            </div>

            <div>
                <button type="submit" 
                        class="group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-primary hover:bg-emerald-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition duration-300">
                    <span class="absolute left-0 inset-y-0 flex items-center pl-3">
                        <svg class="h-5 w-5 text-blue-500 group-hover:text-blue-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                            <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd" />
                        </svg>
                    </span>
                    Iniciar Sesión
                </button>
            </div>

            <div class="text-center">
                <a href="{{ url_for('index') }}" class="text-sm text-primary hover:text-emerald-700">
                    ← Volver al inicio
                </a>
            </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
