{% extends "base.html" %}

{% block title %}Mi cuenta - Junta de Vecinos{% endblock %}

{% block content %}
<div class="w-full">
    <div class="mb-8 flex items-center justify-between gap-4">
        <div>
            <h1 class="text-3xl font-bold text-gray-900 dark:text-slate-100">Mi cuenta</h1>
            <p class="text-gray-600 dark:text-slate-300 mt-2">Cambia tu contraseña.</p>
        </div>
        <a href="{{ url_for('dashboard') }}"
           class="bg-gray-300 hover:bg-gray-400 text-gray-800 font-bold py-2 px-4 rounded-lg transition duration-300">
            Volver
        </a>
    </div>

    <div class="bg-white dark:bg-slate-900 shadow-md rounded-lg p-6 border border-gray-100 dark:border-slate-800 max-w-2xl">
        <form method="POST" class="space-y-6">
            <div>
                <label for="password_actual" class="block text-sm font-medium text-gray-700 dark:text-slate-200 mb-2">Contraseña actual *</label>
                <input type="password" id="password_actual" name="password_actual" required
                       class="w-full px-3 py-2 border border-gray-300 dark:border-slate-700 rounded-md shadow-sm focus:outline-none focus:ring-primary focus:border-primary dark:bg-slate-950 dark:text-slate-100">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label for="password_nueva" class="block text-sm font-medium text-gray-700 dark:text-slate-200 mb-2">Nueva contraseña *</label>
                    <input type="password" id="password_nueva" name="password_nueva" required
                           class="w-full px-3 py-2 border border-gray-300 dark:border-slate-700 rounded-md shadow-sm focus:outline-none focus:ring-primary focus:border-primary dark:bg-slate-950 dark:text-slate-100 placeholder-gray-400 dark:placeholder-slate-400"
                           placeholder="mínimo 6 caracteres">
                </div>
                <div>
                    <label for="password_repetir" class="block text-sm font-medium text-gray-700 dark:text-slate-200 mb-2">Repetir nueva contraseña *</label>
                    <input type="password" id="password_repetir" name="password_repetir" required
                           class="w-full px-3 py-2 border border-gray-300 dark:border-slate-700 rounded-md shadow-sm focus:outline-none focus:ring-primary focus:border-primary dark:bg-slate-950 dark:text-slate-100">
                </div>
            </div>

            <div class="flex justify-end gap-3 pt-2">
                <button type="submit"
                        class="bg-primary hover:bg-emerald-700 text-white font-bold py-2 px-4 rounded-lg transition duration-300">
                    Guardar contraseña
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
